<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Bahçe 5 Problem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f1f5f9;
        }
        .canvas-container {
            touch-action: none;
        }
        #drawing-canvas {
            cursor: crosshair;
        }
        .hidden {
            display: none;
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .error-anim {
            animation: bounce-subtle 0.5s ease infinite;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-violet-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight uppercase">1 Bahçe 5 Problem</h1>
                <p class="text-indigo-100 text-sm font-medium">Zincirleme Matematik Görevi</p>
            </div>
            <div id="step-counter" class="bg-white/20 px-4 py-2 rounded-2xl backdrop-blur-md font-bold">
                SORU 1 / 5
            </div>
        </div>

        <!-- Main Content Area -->
        <div id="game-content" class="p-6 space-y-6">
            
            <!-- Question Box -->
            <div class="bg-indigo-50 border-l-8 border-indigo-500 p-5 rounded-xl shadow-sm">
                <p id="question-text" class="text-xl font-semibold leading-snug text-slate-700">
                    Yükleniyor...
                </p>
                <div class="mt-4 flex items-start gap-2 bg-white/50 p-3 rounded-lg border border-indigo-100">
                    <span class="text-indigo-600 font-bold text-sm uppercase whitespace-nowrap">İpucu:</span>
                    <p id="hint-text" class="text-sm text-slate-600 italic leading-tight"></p>
                </div>
            </div>

            <!-- Drawing Canvas Area -->
            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <label class="text-sm font-bold text-slate-500 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                        Çizerek Hesapla
                    </label>
                    <button id="clear-btn" class="flex items-center gap-1 text-xs font-bold text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-full transition-colors border border-red-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                        TEMİZLE
                    </button>
                </div>
                <div class="canvas-container relative border-2 border-slate-200 rounded-2xl bg-slate-50 h-72 overflow-hidden shadow-inner">
                    <canvas id="drawing-canvas" class="w-full h-full"></canvas>
                </div>
            </div>

            <!-- Answer Box -->
            <div class="flex flex-col sm:flex-row gap-4 pt-4 border-t border-slate-100">
                <div class="flex-1 relative">
                    <input
                        type="number"
                        id="answer-input"
                        class="w-full text-3xl font-black p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-center"
                        placeholder="?"
                    />
                    <div id="error-msg" class="hidden absolute -top-8 left-0 right-0 text-center text-red-500 font-bold text-sm error-anim">
                        Cevap doğru değil, tekrar dene!
                    </div>
                </div>
                <button id="submit-btn" class="flex-[0.6] py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95 bg-green-500 text-white hover:bg-green-600">
                    KONTROL ET
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden p-12 text-center space-y-8 bg-gradient-to-b from-white to-indigo-50">
            <div class="relative inline-block">
                <div class="absolute inset-0 bg-green-200 rounded-full blur-2xl opacity-50"></div>
                <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="relative"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div class="space-y-4">
                <h2 class="text-4xl font-black text-slate-900 leading-tight uppercase">Mükemmel!</h2>
                <p class="text-xl text-slate-600 max-w-sm mx-auto leading-relaxed">
                    Tüm problemleri bir dedektif gibi birbirine bağlayarak çözdün. Harika bir iş çıkardın!
                </p>
            </div>
            <button id="restart-btn" class="px-12 py-4 bg-indigo-600 text-white text-xl font-bold rounded-2xl hover:bg-indigo-700 shadow-xl shadow-indigo-200 transition-all hover:-translate-y-1 active:translate-y-0">
                YENİDEN DENE
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "Bir bahçıvan sabah 45 tane elma, öğleden sonra ise elmaların sayısından 12 eksik olacak şekilde armut topluyor. Sepette toplam kaç meyve oldu?",
                hint: "Sonucu unutmaman iyi olacaktır, ihtiyacın olacak!",
                correctAnswer: 78
            },
            {
                text: "Bahçıvan sepetteki tüm meyveleri 6 farklı kasaya eşit şekilde paylaştırıyor. Her bir kasada kaç meyve olur?",
                hint: "Bir önceki soruda bulduğun sonucu hatırlıyor musun?",
                correctAnswer: 13
            },
            {
                text: "Her bir kasadaki meyve sayısının 4 katı kadar çilek fidesi dikiliyor. Bahçeye toplam kaç çilek fidesi dikilmiştir?",
                hint: "Bir önceki adımda ulaştığın sayıya tekrar ihtiyacın var.",
                correctAnswer: 52
            },
            {
                text: "Dikilen çilek fidelerinden 18 tanesi kuruyor, kalan fidelerin ise yarısı meyve veriyor. Meyve veren kaç çilek fidesi vardır?",
                hint: "Bir önceki soruda bulduğun toplam fide sayısını hatırlamalısın.",
                correctAnswer: 17
            },
            {
                text: "Meyve veren her bir çilek fidesinden 5'er tane çilek topluyorsun. Toplam kaç çileğin oldu?",
                hint: "Bir önceki sorudaki meyve veren fide sayısı bu sorunun anahtarı!",
                correctAnswer: 85
            }
        ];

        let currentStep = 0;
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Initialize Canvas Size
        function initCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(2, 2);
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 3;
        }

        window.addEventListener('resize', initCanvas);
        window.addEventListener('load', () => {
            initCanvas();
            loadQuestion();
        });

        // Drawing Logic
        function startDrawing(e) {
            isDrawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.closePath();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', stopDrawing);

        document.getElementById('clear-btn').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Game Logic
        function loadQuestion() {
            if (currentStep < questions.length) {
                const q = questions[currentStep];
                document.getElementById('question-text').innerText = q.text;
                document.getElementById('hint-text').innerText = q.hint;
                document.getElementById('step-counter').innerText = `SORU ${currentStep + 1} / 5`;
                document.getElementById('answer-input').value = '';
                document.getElementById('error-msg').classList.add('hidden');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('game-content').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('step-counter').classList.add('hidden');
        }

        document.getElementById('submit-btn').addEventListener('click', () => {
            const inputVal = parseInt(document.getElementById('answer-input').value);
            if (inputVal === questions[currentStep].correctAnswer) {
                currentStep++;
                loadQuestion();
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        });

        document.getElementById('answer-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('submit-btn').click();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            currentStep = 0;
            document.getElementById('game-content').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('step-counter').classList.remove('hidden');
            loadQuestion();
        });
    </script>
</body>
</html>
