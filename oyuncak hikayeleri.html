<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hikaye Dünyası</title>
    <!-- Tailwind CSS'i projemize dahil ediyoruz -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ekranı ortalamak ve genel görünümü iyileştirmek için temel stiller */
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease;
        }
        /* Cümleler arası geçişin daha yumuşak olması için bir animasyon ekliyoruz */
        .sentence {
            transition: all 0.3s ease-in-out;
            padding: 4px 8px;
            border-radius: 8px;
            display: inline; /* Cümlelerin alt alta değil, yan yana devam etmesini sağlar */
            line-height: 2;
        }
        /* Vurgulanan cümlenin stilini belirliyoruz */
        .highlight {
            color: white;
        }
        
        /* Ekran geçişleri için animasyon */
        .screen {
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
            width: 100%;
        }
        .screen.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none; /* Gizli ekranda tıklamaları engeller */
            position: absolute; /* Akışı bozmamak için */
            top: 0;
            left: 0;
        }
        .character-card, .story-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .character-card:hover, .story-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>

            </div>
        </div>

        <!-- Hikaye Listesi Ekranı (Başlangıçta gizli) -->

                <!-- Hikaye listesi JavaScript ile buraya eklenecek -->
            </div>

                    { id: 'j3', title: 'Yodel Dersi', sentences: ["Jessie, odanın en iyi yodel söyleyeniydi.", "Diğer oyuncaklar da ondan öğrenmek istediler.", "Jessie, 'Yodel Akademisi'ni kurduğunu duyurdu.", "İlk öğrencisi hevesli ama yeteneksiz Rex oldu.", "Rex denediğinde sadece komik bir gürültü çıkardı.", "Woody, kovboy tarzıyla fena sayılmazdı.", "Buzz ise robotik bir sesle 'Yo-del-ay-hee-hoo' dedi.", "Herkesin denemesi Jessie'yi çok güldürdü.", "En iyi yodel söyleyen olmasalar da, hepsi çok eğlendi.", "Jessie, önemli olanın denemek ve eğlenmek olduğunu söyledi."]},
                    { id: 'j4', title: 'Büyük Yarış', sentences: ["Jessie, atı Gözü Kara'nın odanın en hızlısı olduğunu iddia etti.", "Buzz, bunun doğru olmadığını düşündü.", "Bir yarış düzenlemeye karar verdiler.", "Jessie ve Gözü Kara, RC arabasına karşı yarışacaktı.", "Yarış parkuru yatak odasından koridora kadardı.", "Yeşil askerler başlangıç işaretini verdi.", "Yarış başladığında RC arabası hızla öne geçti.", "Ama keskin bir virajda duvara çarptı.", "Jessie ve Gözü Kara sabit bir hızla devam ettiler ve yarışı kazandılar.", "Jessie, 'Yavaş ve istikrarlı olan yarışı kazanır!' dedi."]},
                    { id: 'j5', title: 'Çiçek Bahçesi', sentences: ["Jessie, pencerenin dışındaki çiçekleri çok seviyordu.", "Bir gün, oyuncaklar için kendi bahçelerini yapmaya karar verdi.", "Renkli oyun hamurlarından çiçekler yaptılar.", "Yeşil pipetleri sap olarak kullandılar.", "Herkes kendi çiçeğini tasarladı.", "Rex, dev bir etobur bitki yaptı.", "Buzz, uzaydan gelmiş gibi görünen parlak bir çiçek yaptı.", "Oyuncak kutusunun bir köşesini bu renkli çiçeklerle süslediler.", "Artık odanın içinde de kendi neşeli bahçeleri vardı.", "Jessie'nin fikri odaya renk katmıştı."]},
                    { id: 'j6', title: 'Korku Tüneli', sentences: ["Jessie, Rex'in korkularını yenmesine yardım etmek istedi.", "Yastıklardan ve battaniyelerden bir 'korku tüneli' yaptılar.", "Tünelin içi karanlıktı.", "Jessie, 'Korkma Rex, ben yanındayım,' dedi.", "İçeriye komik sesler çıkaran küçük oyuncaklar koydular.", "Rex başta tereddüt etti ama Jessie elini tuttu.", "Birlikte tünelden geçtiler.", "Diğer tarafa ulaştıklarında Rex kahkahalarla gülüyordu.", "Hiç de korkutucu olmadığını fark etti.", "Jessie, arkadaşına cesaret verdiği için çok gururluydu."]},
                    { id: 'j7', title: 'Dans Partisi', sentences: ["Jessie, müziği ve dans etmeyi çok severdi.", "Bir akşam bir dans partisi düzenlemeye karar verdi.", "Andy'nin müzik kutusunu açtılar.", "Jessie, Woody ile kovboy dansı yaptı.", "Buzz, robotik hareketleriyle herkesi güldürdü.", "Slinky, yayıyla komik dans figürleri sergiledi.", "Rex, olduğu yerde zıplayarak dans etmeye çalıştı.", "Partinin en neşeli anı, herkesin bir daire olup şarkı söylemesiydi.", "Oda, müzik ve kahkahalarla doluydu.", "Jessie'nin partileri her zaman en iyisiydi."]},
                    { id: 'j8', title: 'Eski Fotoğraf', sentences: ["Bir gün Jessie, Andy'nin annesinin eski bir fotoğrafını buldu.", "Fotoğrafta küçük bir kız ve bir kovboy kız oyuncağı vardı.", "Jessie, eski sahibi Emily'yi hatırladı.", "Arkadaşlarına Emily ile olan maceralarını anlattı.", "Birlikte ne kadar çok eğlendiklerini söyledi.", "Geçmişi hatırlamak onu biraz hüzünlendirdi.", "Ama Woody ona, 'Artık bizimle birliktesin ve biz senin aileniz,' dedi.", "Jessie gülümsedi ve arkadaşlarına sarıldı.", "Yeni ailesiyle birlikte olduğu için çok şanslıydı."]},
                    { id: 'j9', title: 'At Gözü Kara\'nın Bakımı', sentences: ["Jessie, atı Gözü Kara'ya çok iyi bakardı.", "Her sabah onun yelesini tarar gibi yapardı.", "Ona en lezzetli hayali elmaları verirdi.", "Bazen onu odanın içinde dört nala koştururdu.", "Eğer Gözü Kara düşerse, hemen onu kaldırır ve 'İyi misin dostum?' diye sorardı.", "Diğer oyuncaklar, Jessie'nin atına olan sevgisine hayrandı.", "Gözü Kara konuşamasa da, Jessie onun ne düşündüğünü anlardı.", "Onların arasındaki bağ çok özeldi.", "Jessie, gerçek bir hayvanseverdi."]},
                    { id: 'j10', title: 'Yeni Kement', sentences: ["Jessie'nin eski kemendi biraz yıpranmıştı.", "Woody, ona yeni bir kement yapmaya karar verdi.", "Ayakkabı bağcıklarından ve bir anahtarlıktan yeni bir kement yaptı.", "Jessie yeni kementini görünce çok sevindi.", "Hemen denemek için dışarı çıktılar.", "Kementiyle küçük bir topu yakalamayı başardı.", "Woody'ye teşekkür etti ve ona kocaman sarıldı.", "Artık rodeo gösterileri için yepyeni bir kemendi vardı.", "Bu, bir arkadaşın verebileceği en güzel hediyeydi."]}
                ]

                    { id: 'r2', title: 'Video Oyunu Kralı', sentences: ["Andy'nin yeni bir video oyunu vardı.", "Rex, oyunu oynamak için sabırsızlanıyordu.", "Oyun, bir uzaylı istilasını konu alıyordu.", "Rex, küçük kollarıyla oyun kumandasını zorlukla tutuyordu.", "Ama oyunda inanılmaz derecede iyiydi.", "En yüksek skoru yaparak oyunu bitirdi.", "Diğer oyuncaklar onun başarısını hayranlıkla izledi.", "Buzz bile onun oyun yeteneğine şaşırmıştı.", "Rex, 'Ben bir oyun dinozoruyum!' diye neşeyle bağırdı.", "O gün Rex, odanın video oyunu kralı oldu."]},

                    { id: 'r4', title: 'Kayıp Gözlük', sentences: ["Andy'nin babasının gözlüğü kaybolmuştu.", "Oyuncaklar, onu bulmak için bir arama başlattı.", "Rex, iyi bir gözlemci olduğunu kanıtlamak istiyordu.", "Odanın içinde bir dedektif gibi dolaştı.", "Her detayı dikkatlice inceledi.", "Kitapların arasına, yastıkların altına baktı.", "Sonunda gözlüğü kanepenin minderleri arasında buldu.", "Gözlüğü burnuna takıp 'Buldum!' diye bağırdı.", "Herkes onu tebrik etti.", "Rex, o gün harika bir iş çıkarmıştı."]},
                    { id: 'r5', title: 'Korkunç Kükreme', sentences: ["Rex, her zaman korkutucu bir şekilde kükremek istemişti.", "Ama ne zaman denese, sadece cılız bir ses çıkıyordu.", "Bu onu çok üzüyordu.", "Jessie ona yardım etmeye karar verdi.", "'Daha derinden nefes almalısın Rex,' dedi.", "Rex, karnını şişirerek derin bir nefes aldı.", "Sonra tüm gücüyle bağırdı: 'RAAAAAWRRRR!'", "Bu seferki kükremesi o kadar güçlüydü ki, küçük askerler devrildi.", "Rex, sonunda başardığı için çok mutluydu.", "Artık gerçek bir Tyrannosaurus Rex gibi kükreyebiliyordu."]},
                    { id: 'r6', title: 'Çay Partisi', sentences: ["Küçük Bo Peep, bir çay partisi düzenliyordu.", "Woody ve Buzz'ı davet etmişti ama bir misafiri eksikti.", "Rex'i de davet etmeye karar verdi.", "Rex, küçük fincanları devirmekten çok korkuyordu.", "'Ben çok sakarım,' dedi.", "Bo Peep, 'Sorun değil Rex, sadece eğlenmene bak,' dedi.", "Rex, çok dikkatli bir şekilde masaya oturdu.", "Hiçbir şeyi devirmeden hayali çayını içti.", "Parti çok keyifliydi.", "Rex, nazik ve dikkatli olabildiğini görünce kendine daha çok güvendi."]},
                    { id: 'r7', title: 'Dinozor Hikayesi', sentences: ["Bir akşam, oyuncaklar birbirlerine hikayeler anlatıyorlardı.", "Sıra Rex'e geldiğinde, bildiği en iyi hikayeyi anlatmaya karar verdi.", "Milyonlarca yıl önce yaşayan dinozorların hikayesiydi bu.", "Triceratops'ları, Stegosaurus'ları anlattı.", "Sesi heyecanla titriyordu.", "Diğer oyuncaklar onu ağızları açık dinledi.", "Rex, dinozorlar hakkında ne kadar çok şey bildiğini gösterdi.", "Hikayesi bittiğinde herkes onu alkışladı.", "O sadece bir oyuncak değil, aynı zamanda bir dinozor uzmanıydı.", "Rex, bilgisiyle gurur duydu."]},
                    { id: 'r8', title: 'Yeni Kostüm', sentences: ["Andy, Rex için kağıttan bir uzaylı kostümü yapmıştı.", "Rex, kostümü giymek istemiyordu çünkü komik göründüğünü düşünüyordu.", "Buzz, 'Harika görünüyorsun asker!' dedi.", "Jessie, 'Çok yakışmış!' diye ekledi.", "Arkadaşlarının desteğiyle Rex kostümü giydi.", "Aynada kendine baktı ve gülmeye başladı.", "Gerçekten de komik ama sevimli görünüyordu.", "O gün boyunca bir 'Dino-Uzaylı' olarak oyunlar oynadı.", "Farklı olmanın eğlenceli olabileceğini öğrendi."]},
                    { id: 'r9', title: 'Resim Dersi', sentences: ["Oyuncaklar, Andy'nin boya kalemleriyle resim yapmaya karar verdiler.", "Rex, ne çizeceğini bilemiyordu.", "Woody bir kovboy şapkası çizdi, Jessie ise bir çiçek.", "Rex, küçük kollarıyla kalemi tutmakta zorlandı.", "Sonunda sadece renkli karalamalar yapabildi.", "Resmi bittiğinde biraz utandı.", "Ama Slinky, 'Rex, bu bir gökkuşağı fırtınası gibi! Harika!' dedi.", "Herkes onun resminin ne kadar neşeli olduğu konusunda hemfikirdi.", "Rex, herkesin sanatının farklı ve özel olduğunu anladı."]},
                    { id: 'r10', title: 'İyi Bir Dinleyici', sentences: ["Küçük yeşil askerlerden biri oyun sırasında kaybolmuştu.", "Komutanı çok endişeliydi ve Rex'e dert yandı.", "Rex, ne yapacağını bilemese de sessizce onu dinledi.", "Askerin endişelerini ve korkularını anlattı.", "Rex sadece başını salladı ve 'Her şey yoluna girecek,' dedi.", "Sadece dinlenilmek bile komutanı rahatlatmıştı.", "Kısa bir süre sonra kayıp asker bulundu.", "Komutan, Rex'e teşekkür etti.", "Rex, bazen en iyi yardımın sadece iyi bir dinleyici olmak olduğunu öğrendi."]}

                    { id: 's1', title: 'Uzakta Kalan Top', sentences: [ "Sadık köpek Slinky, her zaman arkadaşlarını gözetirdi.", "Bir gün oyun oynarlarken, en sevdikleri kırmızı top kanepenin çok uzağına kaçtı.", "Hiçbir oyuncak oraya ulaşamıyordu.", "Herkes topun sonsuza dek kaybolduğunu düşünüp üzülmeye başladı.", "Ama Slinky'nin bir fikri vardı.", "Woody'ye, \"Arka bacaklarımı sen tut!\" dedi.", "Woody onu sıkıca tutarken, Slinky yayılan gövdesini kanepe altına doğru uzattı.", "Biraz daha, biraz daha derken burnuyla topa değmeyi başardı.", "Topu yavaşça kendine doğru itti ve kurtardı.", "Bütün oyuncaklar, Slinky'nin ne kadar harika ve yardımsever bir arkadaş olduğunu bir kez daha anladılar." ] },
                    { id: 's2', title: 'Oyuncak Köprüsü', sentences: ["Oyuncaklardan biri, masanın üzerinde mahsur kalmıştı.", "Yere inmek için çok yüksekti.", "Diğerleri nasıl yardım edeceklerini düşünüyorlardı.", "Slinky, 'Ben bir köprü olabilirim!' dedi.", "Ön ayaklarını yatağa, arka ayaklarını masaya koydu.", "Gövdesini gererek arada bir köprü oluşturdu.", "Mahsur kalan oyuncak, Slinky'nin sırtından yürüyerek güvenle yatağa indi.", "Slinky, esnek vücudu sayesinde günü kurtarmıştı.", "O, odanın en güvenilir köprüsüydü.", "Herkes ona minnettardı."]},
                    { id: 's3', title: 'Düğüm Macerası', sentences: ["Slinky, oynarken yanlışlıkla kendi etrafında dolandı.", "Yayı o kadar karışmıştı ki hareket edemiyordu.", "Tam bir düğüm haline gelmişti.", "Arkadaşları hemen yardıma koştu.", "Woody bir ucundan çekti, Buzz diğer ucundan itti.", "Ama düğüm daha da sıkılaştı.", "Sonunda yeşil askerler, organize bir şekilde çalışarak yayı açmayı başardılar.", "Her bir halkayı dikkatlice birbirinden ayırdılar.", "Slinky sonunda serbest kaldı ve rahat bir nefes aldı.", "Arkadaşları olmadan bunu başaramazdı."]},
                    { id: 's4', title: 'Gizli Hazine', sentences: ["Slinky, bir köpek gibi harika bir koku alma duyusuna sahipti.", "Bir gün odada çok lezzetli bir koku aldı.", "Bu kokunun peşine düşmeye karar verdi.", "Burnunu yere yaklaştırarak kokuyu takip etti.", "Koku onu yatağın altına götürdü.", "Orada, Andy'nin unuttuğu bir paket bisküvi vardı.", "Slinky zaferle havladı ve diğer oyuncakları çağırdı.", "Herkes bu beklenmedik hazineye çok sevindi.", "O gün hayali bir bisküvi ziyafeti çektiler.", "Slinky'nin burnu onlara her zaman yol gösterirdi."]},
                    { id: 's5', title: 'Merdiven İnişi', sentences: ["Slinky'nin en sevdiği şeylerden biri merdivenlerden inmekti.", "Önce ön ayaklarını bir basamağa koyardı.", "Sonra 'kıvrınk, kıvrınk, kıvrınk' sesiyle arka kısmı onu takip ederdi.", "Bu sesi duymak diğer oyuncakları her zaman güldürürdü.", "Bir gün en hızlı merdiven inme rekorunu kırmaya karar verdi.", "Yukarıdan kendini bıraktı ve hızla basamakları indi.", "Aşağı indiğinde yayı biraz başını döndürmüştü.", "Ama çok eğlenmişti.", "Diğer oyuncaklar onu alkışladı.", "Slinky, odanın en eğlenceli oyuncağıydı."]},
                    { id: 's6', title: 'Sıcak Bir Yer', sentences: ["Soğuk bir kış günüydü.", "Oyuncaklar, sıcak bir yer arıyorlardı.", "Slinky, odada dolaşırken yere vuran bir güneş ışığı fark etti.", "Güneşin ısıttığı o noktaya kıvrılıp yattı.", "Kısa sürede sıcacık olmuştu.", "Diğer oyuncakları da yanına çağırdı.", "Hepsi birlikte güneşli noktada toplandılar.", "Sanki küçük bir kumsalda gibiydiler.", "Slinky, en basit şeylerin bile nasıl mutluluk verebileceğini biliyordu.", "O gün hep birlikte güneşin tadını çıkardılar."]},
                    { id: 's7', title: 'İtfaiye Hortumu', sentences: ["Oyuncaklar, bir yangın söndürme oyunu oynuyorlardı.", "Yastıklardan yaptıkları bir ev 'yanıyordu'.", "Ama bir itfaiye hortumları yoktu.", "Slinky'nin aklına parlak bir fikir geldi.", "Bir ucunu musluğun altına (hayali olarak) tuttular.", "Diğer ucunu Woody, yanan eve doğru yöneltti.", "Slinky, kendini bir hortum gibi uzattı.", "Hayali suyla yangını söndürdüler.", "Slinky, her oyuna uyum sağlayabilen harika bir oyuncaktı.", "Onun sayesinde oyunları daha da gerçekçi oluyordu."]},
                    { id: 's8', title: 'Sadık Dost', sentences: ["Woody, bir gün kendini biraz üzgün hissediyordu.", "Sessizce pencerenin önünde oturuyordu.", "Slinky, onun üzgün olduğunu fark etti.", "Yavaşça yanına geldi ve başını Woody'nin bacağına yasladı.", "Hiçbir şey söylemedi, sadece orada durdu.", "Woody, Slinky'nin başını okşadı ve gülümsedi.", "Bazen kelimelere gerek yoktu.", "İyi bir dostun varlığını hissetmek yeterliydi.", "Slinky, ne zaman ihtiyaç duyulsa oradaydı.", "O, gerçekten de bir insanın en iyi dostuydu."]},
                    { id: 's9', title: 'Kuyruk Sallama', sentences: ["Slinky neşelendiğinde, arkasındaki küçük yaylı kuyruğu sallanırdı.", "Bir gün Jessie o kadar komik bir şaka yaptı ki, Slinky'nin kuyruğu kontrolden çıktı.", "O kadar hızlı sallanıyordu ki, etrafındaki küçük oyuncakları deviriyordu.", "Slinky ne kadar durmaya çalışsa da durduramadı.", "Herkes kahkahalarla gülüyordu.", "Sonunda sakinleşti ve kuyruğu yavaşladı.", "Utanarak devirdiği oyuncakları kaldırdı.", "Ama kimse ona kızmamıştı.", "Onun neşesi bulaşıcıydı.", "Herkes Slinky'nin mutlu olmasını seviyordu."]},
                    { id: 's10', title: 'Gece Bekçisi', sentences: ["Tüm oyuncaklar uyurken, Slinky bazen uyanık kalırdı.", "Kendini odanın gece bekçisi olarak görüyordu.", "Yatağın altından odayı dinlerdi.", "Her şeyin yolunda olduğundan emin olurdu.", "Eğer bir tıkırtı duyarsa, sessizce kontrol ederdi.", "Genellikle sadece evin çıkardığı normal sesler olurdu.", "O, arkadaşlarının güvende uyuduğunu bilmekten mutlu olurdu.", "Slinky, sadık ve koruyucu bir arkadaştı.", "Sabah olduğunda, kimseye bir şey belli etmeden yerine geçerdi.", "Ama herkes onun sayesinde rahat uyuyordu."]}

            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = `character-card cursor-pointer p-4 rounded-2xl text-white ${char.color} shadow-lg`;
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${char.image}" alt="${char.name}" class="w-24 h-24 rounded-full border-4 border-white object-cover flex-shrink-0">
                        <div class="text-left">
                            <h2 class="text-2xl font-bold">${char.name}</h2>
                            <p class="font-light mt-1">${char.stories.length} Macera</p>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => showStoryList(char.id));
                characterGrid.appendChild(card);
            });
        }
        
        // Hikaye listesi ekranını gösterme
        function showStoryList(characterId) {
            currentCharacter = characters.find(c => c.id === characterId);
            if (!currentCharacter) return;

            characterHeader.innerHTML = `
                <img src="${currentCharacter.image}" alt="${currentCharacter.name}" class="w-32 h-32 mx-auto rounded-full border-4 border-white mb-4 object-cover shadow-lg">
                <h1 class="text-4xl font-bold text-slate-800">${currentCharacter.name}'in Maceraları</h1>
            `;
            
            storyListGrid.innerHTML = '';
            currentCharacter.stories.forEach(story => {
                const storyCard = document.createElement('div');
                storyCard.className = `story-card cursor-pointer p-4 rounded-lg text-white text-center ${currentCharacter.color} shadow-md`;
                storyCard.textContent = story.title;
                storyCard.addEventListener('click', () => showStory(currentCharacter.id, story.id));
                storyListGrid.appendChild(storyCard);
            });

            characterSelectionScreen.classList.add('hidden');
            storyScreen.classList.add('hidden');
            storyListScreen.classList.remove('hidden');
            body.className = `${currentCharacter.bgColor} flex items-center justify-center min-h-screen p-4`;
        }

        // Hikaye okuma ekranını gösterme
        function showStory(characterId, storyId) {
            const character = characters.find(c => c.id === characterId);
            if (!character) return;
            currentStory = character.stories.find(s => s.id === storyId);
            if (!currentStory) return;

            storyTitle.textContent = currentStory.title;
            storyText.innerHTML = '';
            currentSentences = []; 

            currentStory.sentences.forEach(sentenceText => {
                const span = document.createElement('span');
                span.className = 'sentence';
                span.textContent = sentenceText + ' ';
                storyText.appendChild(span);
                currentSentences.push(span);
            });
            
            currentSentenceIndex = 0;
            updateHighlight();

            storyListScreen.classList.add('hidden');
            storyScreen.classList.remove('hidden');
        }

        // Cümle vurgusunu güncelleme
        function updateHighlight() {
            currentSentences.forEach((s, index) => {
                s.classList.remove(currentCharacter.highlightColor, 'highlight', 'text-white');
                if (index === currentSentenceIndex) {
                    s.classList.add(currentCharacter.highlightColor, 'highlight', 'text-white');
                }
            });
        }

        function showCharacterSelectionScreen() {
            storyListScreen.classList.add('hidden');
            storyScreen.classList.add('hidden');
            characterSelectionScreen.classList.remove('hidden');
            body.className = 'bg-slate-100 flex items-center justify-center min-h-screen p-4';
            currentCharacter = null;
            currentStory = null;
        }

        // Klavye olayları
        document.addEventListener('keydown', function(event) {
            if (!currentStory || currentSentences.length === 0) return;

            if (event.key === 'ArrowRight') {
                if (currentSentenceIndex < currentSentences.length - 1) {
                    currentSentenceIndex++;
                    updateHighlight();
                }
            } else if (event.key === 'ArrowLeft') {
                if (currentSentenceIndex > 0) {
                    currentSentenceIndex--;
                    updateHighlight();
                }
            }
        });
        
        // Geri tuşları olayları
        backToCharactersButton.addEventListener('click', showCharacterSelectionScreen);
        backToStoryListButton.addEventListener('click', () => {
            if (currentCharacter) {
                showStoryList(currentCharacter.id);
            }
        });

        // Başlangıç
        createCharacterSelectionScreen();
    </script>
</body>
</html>
