<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harf Avcısı - 100 Kelime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap');
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
        }
        .word-text {
            display: flex;
            align-items: baseline;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            color: #1f2937;
            letter-spacing: 0.1em;
        }
        .letter-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 3.5rem;
            height: 4.5rem;
            border-bottom: 6px solid #3b82f6;
            margin: 0 0.2rem;
            color: #1e40af;
            line-height: 1;
        }
        .card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="max-w-md w-full bg-white rounded-3xl card p-8 text-center">
        <div class="flex justify-between items-start mb-2">
            <h1 class="text-2xl font-bold text-blue-800">Harf Avcısı 🎯</h1>
            <div id="score-display" class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-lg font-bold text-sm">Puan: 0</div>
        </div>
        
        <div class="mb-4">
            <span id="category-badge" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold uppercase"></span>
        </div>

        <div id="word-display" class="word-text mb-10 min-h-[120px]">
            <!-- Kelime buraya gelecek -->
        </div>

        <div id="options-container" class="grid grid-cols-2 gap-4 mb-8">
            <!-- Butonlar buraya gelecek -->
        </div>

        <div id="feedback" class="h-8 mb-4 font-semibold text-lg transition-all duration-300"></div>

        <div class="w-full bg-gray-200 rounded-full h-2.5 mb-2">
            <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <div id="progress-text" class="text-xs text-gray-500 font-medium">Soru: 1 / 100</div>
    </div>

            // Y - Ğ (33 Kelime)
            { word: "DA_", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },

            { word: "KO_UN", correct: "Y", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "YA_MUR", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "KA_IK", correct: "Y", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "KA_IT", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },

            { word: "BO_A", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "BA_LAMA", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "SO_UK", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "SA_LIK", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "Ö_LE", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "DA_I", correct: "Y", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "ÇA_RI", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "BA_IR", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "SA_I", correct: "Y", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "BO_A", correct: "Y", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "TU_LA", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" },
            { word: "BA_", correct: "Ğ", options: ["Y", "Ğ"], category: "Y - Ğ Çalışması" }
        ];

        const quizData = rawData.sort(() => Math.random() - 0.5).slice(0, 100);

        let currentIndex = 0;
        let score = 0;

        const wordDisplay = document.getElementById('word-display');
        const optionsContainer = document.getElementById('options-container');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score-display');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const categoryBadge = document.getElementById('category-badge');

        function initGame() {
            loadQuestion();
        }

        function loadQuestion() {
            const currentItem = quizData[currentIndex];
            feedback.innerText = "";
            feedback.className = "h-8 mb-4 font-semibold text-lg transition-all duration-300";
            categoryBadge.innerText = currentItem.category;
            progressText.innerText = `Soru: ${currentIndex + 1} / ${quizData.length}`;
            progressBar.style.width = `${(currentIndex / quizData.length) * 100}%`;
            
            wordDisplay.innerHTML = "";
            const parts = currentItem.word.split("_");
            
            if(parts[0]) {
                const span1 = document.createElement('span');
                span1.innerText = parts[0];
                wordDisplay.appendChild(span1);
            }

            const placeholder = document.createElement('div');
            placeholder.className = "letter-box";
            placeholder.id = "placeholder";
            placeholder.innerText = ""; // Başta boş kalsın
            wordDisplay.appendChild(placeholder);

            if(parts[1]) {
                const span2 = document.createElement('span');
                span2.innerText = parts[1];
                wordDisplay.appendChild(span2);
            }

            optionsContainer.innerHTML = "";
            currentItem.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "py-4 bg-white border-2 border-blue-200 hover:border-blue-500 hover:bg-blue-50 text-2xl font-bold rounded-2xl transition-all duration-200 text-blue-800 shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            const currentItem = quizData[currentIndex];
            const placeholder = document.getElementById('placeholder');
            const buttons = optionsContainer.querySelectorAll('button');
            
            if (selected === currentItem.correct) {
                placeholder.innerText = selected;
                placeholder.style.color = "#059669";
                placeholder.style.borderBottomColor = "#059669";
                feedback.innerText = "Harika! 🎉";
                feedback.classList.add("text-green-600", "scale-110");
                score += 10;
                scoreDisplay.innerText = `Puan: ${score}`;
                
                buttons.forEach(b => b.disabled = true);

                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < quizData.length) {
                        loadQuestion();
                    } else {
                        showFinalScore();
                    }
                }, 1000);
            } else {
                feedback.innerText = "Tekrar dene! 🤔";
                feedback.className = "h-8 mb-4 font-semibold text-lg text-red-500 animate-pulse";
                wordDisplay.classList.add("animate-bounce");
                setTimeout(() => wordDisplay.classList.remove("animate-bounce"), 500);
            }
        }

        function showFinalScore() {
            progressBar.style.width = "100%";
            document.getElementById('game-container').innerHTML = `
                <div class="py-4">
                    <h1 class="text-4xl font-bold text-blue-800 mb-2">Mükemmel! 🏆</h1>
                    <p class="text-lg text-gray-600 mb-6">100 kelimeyi de tamamladın!</p>
                    <div class="inline-block bg-blue-600 text-white px-8 py-4 rounded-3xl shadow-lg mb-8">
                        <div class="text-sm opacity-80">Toplam Puanın</div>
                        <div class="text-5xl font-bold">${score}</div>
                    </div>
                    <button onclick="location.reload()" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold text-xl hover:bg-green-600 transition-all shadow-md transform hover:-translate-y-1">Yeniden Başla</button>
                </div>
            `;
        }

        window.onload = initGame;
    </script>
</body>
</html>
