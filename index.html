<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İnteraktif Öğrenme Platformu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #a855f7;
            --accent: #f472b6;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.6);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Animated Background */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            animation-duration: 30s;
        }

        .blob-3 {
            top: 40%;
            left: 30%;
            background: radial-gradient(circle, rgba(244, 114, 182, 0.1) 0%, transparent 70%);
            width: 400px;
            height: 400px;
            animation-duration: 20s;
        }

        @keyframes move {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(100px, 100px) scale(1.2);
            }
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            width: 100%;
        }

        /* Header Section */
        header {
            text-align: center;
            margin-bottom: 5rem;
            position: relative;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 100px;
            color: var(--primary-light);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            animation: fadeInDown 0.6s ease-out;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.04em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 span {
            display: block;
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.hero-text {
            font-size: 1.25rem;
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            animation: fadeInDown 1s ease-out;
        }

        /* Search Bar */
        .search-container {
            max-width: 500px;
            margin: 3rem auto 0;
            position: relative;
            animation: fadeIn 1.2s ease-out;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3.5rem;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: rgba(30, 41, 59, 0.8);
        }

        .search-icon {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: color 0.3s ease;
        }

        .search-input:focus+.search-icon {
            color: var(--primary);
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        /* Card Component */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .icon-wrapper {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-light);
            transition: all 0.3s ease;
        }

        .card:hover .icon-wrapper {
            background: var(--gradient-1);
            color: white;
            border-color: transparent;
            transform: rotate(-5deg);
        }

        .card-body h3 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .card-body p {
            color: var(--text-dim);
            font-size: 0.9375rem;
            line-height: 1.5;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary-light);
            font-weight: 600;
            font-size: 0.875rem;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .card:hover .card-footer {
            opacity: 1;
            gap: 0.75rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 4rem 2rem;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        /* Categories Section */
        .categories {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            color: var(--text-dim);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .category-btn.active {
            background: var(--gradient-1);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .category-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* No Results */
        #noResults {
            display: none;
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .container {
                padding: 3rem 1.5rem;
            }

            h1 {
                font-size: 3rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="badge">Eğitim & Oyun Paneli</div>
            <h1>
                İnteraktif
                <span>Öğrenme Dünyası</span>
            </h1>
            <p class="hero-text">
                Öğrenciler için özel olarak tasarlanmış, eğlenceli ve eğitici interaktif içerikler koleksiyonu.
            </p>

            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Bir etkinlik veya konu ara...">
                <i data-lucide="search" class="search-icon"></i>
            </div>
        </header>

        <div class="categories">
            <button class="category-btn active" data-category="all">Tümü</button>
            <button class="category-btn" data-category="okuma">Okuma & Yazma</button>
            <button class="category-btn" data-category="matematik">Matematik</button>
            <button class="category-btn" data-category="diger">Diğer</button>
        </div>

        <div class="grid" id="contentGrid">
            <!-- Cards will be populated here -->
        </div>

        <div id="noResults">
            <i data-lucide="search-x" size="48" style="margin-bottom: 1rem; opacity: 0.5;"></i>
            <p>Aradığınız kriterlere uygun içerik bulunamadı.</p>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2024 İnteraktif Öğrenme Platformu. Tüm Hakları Saklıdır.</p>
            <p style="margin-top: 0.5rem; font-size: 0.75rem; opacity: 0.6;">Öğrenciler için sevgiyle hazırlandı.</p>
        </div>
    </footer>

    <script>
        const content = [
            {
                name: "1. Sınıf Okuma",
                file: "1.OKUMA.html",
                icon: "book-open",
                category: "okuma",
                desc: "1. sınıf öğrencileri için temel okuma pratiği ve etkinlikleri."
            },
            {
                name: "1. Sınıf Matematik",
                file: "1.sınıfmat.html",
                icon: "calculator",
                category: "matematik",
                desc: "Temel matematik becerilerini geliştirmeye yönelik eğlenceli sorular."
            },
            {
                name: "Ağırlık Ölçme",
                file: "Ağırlık ölçme.html",
                icon: "weight",
                category: "matematik",
                desc: "Nesnelerin ağırlıklarını karşılaştırma ve ölçme birimleri."
            },
            {
                name: "Odak Çalışması",
                file: "Odak o-ö-u-ü-y-ğ.html",
                icon: "target",
                category: "okuma",
                desc: "Sesli harf ayrımı ve dikkati odaklama etkinlikleri."
            },
            {
                name: "Sürdürülebilir Kalkınma",
                file: "Sürdürülebilir kalkınma hedefleri.html",
                icon: "leaf",
                category: "diger",
                desc: "Daha iyi bir dünya için sürdürülebilirlik hedeflerini öğrenin."
            },
            {
                name: "Yaratıcılık",
                file: "Yaratıcılık.html",
                icon: "palette",
                category: "diger",
                desc: "Hayal gücünü geliştiren interaktif yaratıcılık uygulaması."
            },
            {
                name: "Yeni Okuma",
                file: "Yeni okuma.html",
                icon: "book",
                category: "okuma",
                desc: "Gelişmiş okuma metinleri ve anlama çalışmaları."
            },
            {
                name: "Zincirleme Problem",
                file: "Zincirleme Problem.html",
                icon: "link",
                category: "matematik",
                desc: "Mantık yürüterek çözülen birbirine bağlı matematik problemleri."
            },
            {
                name: "B-D Harf Ayrımı",
                file: "bd.html",
                icon: "type",
                category: "okuma",
                desc: "B ve D harflerini karıştırmayı önleyici özel egzersizler."
            },
            {
                name: "Kelime Fabrikası",
                file: "kelime fabrikası.html",
                icon: "factory",
                category: "okuma",
                desc: "Hece ve harflerden yeni kelimeler üretme oyunu."
            },
            {
                name: "Kitap Çalışması",
                file: "kitapçalışması.html",
                icon: "library",
                category: "diger",
                desc: "Okunan kitaplar üzerine değerlendirme ve analiz platformu."
            },
            {
                name: "3 Basamaklı Sayılar",
                file: "matematik 3 basamaklı sayıların okunuşu yazılışı.html",
                icon: "hash",
                category: "matematik",
                desc: "3 basamaklı sayıların okunması ve basamak değerleri."
            },
            {
                name: "Oyuncak Hikayeleri",
                file: "oyuncak hikayeleri.html",
                icon: "puzzle",
                category: "okuma",
                desc: "Oyuncakların dünyasında geçen okuma anlama hikayeleri."
            },
            {
                name: "Sosyal Bilgiler",
                file: "sosyalbilgiler2.html",
                icon: "globe",
                category: "diger",
                desc: "Toplum, kültür ve yaşam üzerine interaktif dersler."
            },
            {
                name: "Yaratıcılık Atölyesi",
                file: "yaratıcılık atölyesi.html",
                icon: "pen-tool",
                category: "diger",
                desc: "Yaratıcı düşünme teknikleri ve atölye çalışmaları."
            },
            {
                name: "Çarpma Tırmanışı",
                file: "Çarpma ile tırmanış.html",
                icon: "mountain",
                category: "matematik",
                desc: "Çarpım tablosunu tırmanarak öğrenin."
            }
        ];

        const grid = document.getElementById('contentGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const categoryBtns = document.querySelectorAll('.category-btn');

        let activeCategory = 'all';
        let searchTerm = '';

        function renderContent() {
            const filtered = content.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    item.desc.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesCategory = activeCategory === 'all' || item.category === activeCategory;
                return matchesSearch && matchesCategory;
            });

            grid.innerHTML = '';

            if (filtered.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                filtered.forEach((item, index) => {
                    const card = document.createElement('a');
                    card.href = item.file;
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.05}s`;

                    card.innerHTML = `
                        <div class="card-header">
                            <div class="icon-wrapper">
                                <i data-lucide="${item.icon}"></i>
                            </div>
                            <div style="font-size: 0.75rem; background: rgba(255,255,255,0.05); padding: 0.3rem 0.6rem; border-radius: 5px;">
                                ${item.category.toUpperCase()}
                            </div>
                        </div>
                        <div class="card-body">
                            <h3>${item.name}</h3>
                            <p>${item.desc}</p>
                        </div>
                        <div class="card-footer">
                            <span>Hemen Başla</span>
                            <i data-lucide="arrow-right" size="16"></i>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
            lucide.createIcons();
        }

        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderContent();
        });

        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCategory = btn.dataset.category;
                renderContent();
            });
        });

        // Initial render
        renderContent();
    </script>
</body>

</html>
